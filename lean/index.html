<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lean Six Sigma資格クイズ</title>
<meta name="description" content="Lean Six Sigma Yellow Belt、Green Belt、Black Beltの対策クイズ。総数180問から50問ランダム出題。問題文重複なし。">
<link rel="stylesheet" href="style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802" crossorigin="anonymous"></script>
</head>
<body>
<header>
  <h1 id="pageTitle">Lean Six Sigma資格クイズ</h1>
  <p id="pageDesc">3カテゴリ・総数180問から50問ランダムで出題</p>
</header>
<nav id="quizList"></nav>
<main class="layout">
  <aside class="ad-box left-ad">
    <p class="ad-label">スポンサーリンク</p>
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8398161859137802" data-ad-slot="6325875393" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </aside>
  <section class="quiz-box">
    <div class="status"><span id="counter"></span><span id="score"></span></div>
    <div class="progress"><div id="progressBar"></div></div>
    <h2 id="question"></h2>
    <div id="choices"></div>
    <p id="result"></p>
    <button id="nextBtn">次の問題</button>
  </section>
  <aside class="ad-box right-ad">
    <p class="ad-label">スポンサーリンク</p>
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8398161859137802" data-ad-slot="6325875393" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </aside>
</main>
<script src="data/lean/yellow-belt.js"></script>
<script src="data/lean/green-belt.js"></script>
<script src="data/lean/black-belt.js"></script>
<script src="script.js"></script>
</body>
</html>
